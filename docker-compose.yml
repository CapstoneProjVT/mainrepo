services:
  db:
    image: pgvector/pgvector:pg16
    container_name: internatlas-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-internatlas}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-internatlas}
      POSTGRES_DB: ${POSTGRES_DB:-internatlas}
    ports:
      - "5432:5432"
    volumes:
      - internatlas_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h 127.0.0.1 -U ${POSTGRES_USER:-internatlas} -d ${POSTGRES_DB:-internatlas}"]
      interval: 5s
      timeout: 3s
      retries: 20

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: internatlas-api
    env_file:
      - .env
    environment:
      # Ensure API uses the docker network hostname "db"
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://internatlas:internatlas@db:5432/internatlas}
      ASYNC_DATABASE_URL: ${ASYNC_DATABASE_URL:-postgresql+asyncpg://internatlas:internatlas@db:5432/internatlas}
      API_PORT: ${API_PORT:-8000}
      VECTOR_BACKEND: ${VECTOR_BACKEND:-auto}
      JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
      JWT_SECRET: ${JWT_SECRET:-supersecretchange}
      AUTO_SEED: ${AUTO_SEED:-true}
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - ./apps/api:/app
      - ./data:/data:ro
    command: >
      sh -lc "python wait_for_db.py
      && alembic upgrade head
      && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    container_name: internatlas-web
    env_file:
      - .env
    environment:
      # Next.js can call API via rewrite/proxy, but keep this for any direct fetch usage
      API_ORIGIN: ${API_ORIGIN:-http://api:8000}
      NEXT_PUBLIC_API_BASE: ${NEXT_PUBLIC_API_BASE:-/api}
      WEB_PORT: ${WEB_PORT:-3000}
    depends_on:
      - api
    ports:
      - "3000:3000"
    volumes:
      - ./apps/web:/app
      - /app/node_modules
      - /app/.next
    command: >
      sh -lc "npm install
      && npm run dev"

volumes:
  internatlas_db_data:
