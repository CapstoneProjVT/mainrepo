name: CI
on: [push, pull_request]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Backend tests
        run: |
          cd apps/api
          python -m pip install --upgrade pip
          pip install -e .
          pytest -q
      - name: Frontend build
        run: |
          cd apps/web
          npm install
          npm run build
